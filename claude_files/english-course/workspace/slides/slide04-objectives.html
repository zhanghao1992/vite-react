<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex;
  background-image: url('bg-cream.png');
  background-size: cover;
}
.page {
  width: 720pt; height: 405pt;
  display: flex; flex-direction: column;
}
.header {
  background: #DDA0DD;
  padding: 7pt 20pt;
  display: flex; align-items: center;
  border-radius: 0 0 14pt 14pt;
}
.content {
  padding: 8pt 16pt;
  flex: 1;
  display: flex;
  gap: 8pt;
}
.obj-card {
  background: #FFFFFF;
  border-radius: 14pt;
  padding: 8pt 10pt;
  flex: 1;
  text-align: center;
  border: 2pt solid #F0E0F5;
}
.obj-icon {
  border-radius: 50%;
  width: 40pt; height: 40pt;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 4pt auto;
}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <img src="star-rainbow.png" style="width: 18pt; height: 18pt; margin-right: 6pt;">
    <h2 style="color: #FFFFFF; font-size: 22pt; margin: 0;">学习目标 Learning Objectives</h2>
  </div>
  <div class="content">
    <div class="obj-card">
      <div class="obj-icon" style="background: #E0F4F4;">
        <img src="clock.png" style="width: 26pt; height: 26pt;">
      </div>
      <h3 style="color: #5EA8A7; font-size: 16pt; margin: 0 0 3pt 0;">知识目标</h3>
      <p style="color: #5B4A7A; font-size: 13pt; margin: 0;">掌握时间表达法</p>
      <p style="color: #5B4A7A; font-size: 13pt; margin: 2pt 0 0 0;">It's ___ o'clock.</p>
      <p style="color: #5B4A7A; font-size: 13pt; margin: 2pt 0 0 0;">It's ___:___.</p>
    </div>
    <div class="obj-card">
      <div class="obj-icon" style="background: #FFF0F5;">
        <img src="bubble.png" style="width: 28pt; height: 18pt;">
      </div>
      <h3 style="color: #E8739E; font-size: 16pt; margin: 0 0 3pt 0;">能力目标</h3>
      <p style="color: #5B4A7A; font-size: 13pt; margin: 0;">能用英语描述日常</p>
      <p style="color: #5B4A7A; font-size: 13pt; margin: 2pt 0 0 0;">活动和时间安排</p>
      <p style="color: #5B4A7A; font-size: 13pt; margin: 2pt 0 0 0;">It's time to / for...</p>
    </div>
    <div class="obj-card">
      <div class="obj-icon" style="background: #FFF8E8;">
        <img src="star-pink.png" style="width: 22pt; height: 22pt;">
      </div>
      <h3 style="color: #F0A030; font-size: 16pt; margin: 0 0 3pt 0;">情感目标</h3>
      <p style="color: #5B4A7A; font-size: 13pt; margin: 0;">培养良好的时间</p>
      <p style="color: #5B4A7A; font-size: 13pt; margin: 2pt 0 0 0;">管理意识和习惯</p>
    </div>
  </div>
</div>
</body>
</html>
