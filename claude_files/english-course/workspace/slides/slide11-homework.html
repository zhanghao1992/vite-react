<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex;
  background-image: url('bg-title.png');
  background-size: cover;
}
.page {
  width: 720pt; height: 405pt;
  display: flex; flex-direction: column;
  align-items: center;
  justify-content: center;
}
.hw-box {
  background: rgba(255,255,255,0.93);
  border-radius: 16pt;
  padding: 8pt 14pt;
  width: 540pt;
  border: 3pt solid #FFB6C1;
}
.hw-title-bar {
  background: #FFB6C1;
  border-radius: 8pt;
  padding: 3pt 10pt;
  margin-bottom: 4pt;
  text-align: center;
}
.hw-item {
  display: flex;
  align-items: center;
  margin-bottom: 3pt;
  padding: 4pt 6pt;
  background: #FFF8FC;
  border-radius: 8pt;
  border: 2pt solid #FFE4E9;
}
.hw-num { margin-right: 6pt; }
</style>
</head>
<body>
<div class="page">
  <img src="cloud-left.png" style="position: absolute; top: 12pt; left: 18pt; width: 55pt; height: 35pt;">
  <img src="star-rainbow.png" style="position: absolute; top: 10pt; right: 30pt; width: 28pt; height: 28pt;">
  <img src="bear.png" style="position: absolute; bottom: 12pt; right: 30pt; width: 45pt; height: 45pt;">
  <div class="hw-box">
    <div class="hw-title-bar">
      <h2 style="color: #FFFFFF; font-size: 22pt; margin: 0;">课后作业 Homework</h2>
    </div>
    <div class="hw-item">
      <img src="num-1.png" class="hw-num" style="width: 16pt; height: 16pt;">
      <p style="color: #5B4A7A; font-size: 13pt; margin: 0;"><b>制作你的日程表</b> - 用英语写出你一天的时间安排（至少5个活动）</p>
    </div>
    <div class="hw-item">
      <img src="num-2.png" class="hw-num" style="width: 16pt; height: 16pt;">
      <p style="color: #5B4A7A; font-size: 13pt; margin: 0;"><b>朗读对话</b> - 大声朗读课本 Let's talk 部分的对话3遍</p>
    </div>
    <div class="hw-item">
      <img src="num-3.png" class="hw-num" style="width: 16pt; height: 16pt;">
      <p style="color: #5B4A7A; font-size: 13pt; margin: 0;"><b>抄写重点句型</b> - It's time to... / It's time for... 各抄写2遍</p>
    </div>
    <div class="hw-item">
      <img src="num-4.png" class="hw-num" style="width: 16pt; height: 16pt;">
      <p style="color: #5B4A7A; font-size: 13pt; margin: 0;"><b>口语练习</b> - 和家长用英语对话，练习 What time is it? 句型</p>
    </div>
  </div>
</div>
</body>
</html>
