<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex;
  background-image: url('bg-cream.png');
  background-size: cover;
}
.page {
  width: 720pt; height: 405pt;
  display: flex; flex-direction: column;
}
.header {
  background: #B5D8A0;
  padding: 7pt 20pt;
  display: flex; align-items: center;
  border-radius: 0 0 14pt 14pt;
}
.content {
  padding: 8pt 20pt 4pt 20pt;
  flex: 1;
}
.answer-row {
  display: flex;
  margin-bottom: 5pt;
  align-items: center;
}
.answer-card {
  background: #FFFFFF;
  border-radius: 12pt;
  padding: 6pt 12pt;
  flex: 1;
  display: flex;
  align-items: center;
  border: 2pt solid #D4EDDA;
}
.tip-box {
  background: #FFF0F5;
  border-radius: 10pt;
  padding: 6pt 10pt;
  margin-top: 4pt;
  border: 2pt dashed #FFB6C1;
}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <img src="check.png" style="width: 18pt; height: 18pt; margin-right: 6pt;">
    <h2 style="color: #FFFFFF; font-size: 22pt; margin: 0;">测试答案 Quiz Answers</h2>
  </div>
  <div class="content">
    <div class="answer-row">
      <img src="num-1.png" style="width: 18pt; height: 18pt; margin-right: 6pt;">
      <div class="answer-card">
        <p style="color: #5B4A7A; font-size: 15pt; margin: 0;"><b>A. It's 7 o'clock.</b></p>
        <img src="check.png" style="width: 14pt; height: 14pt; margin-left: 6pt;">
      </div>
    </div>
    <div class="answer-row">
      <img src="num-2.png" style="width: 18pt; height: 18pt; margin-right: 6pt;">
      <div class="answer-card">
        <p style="color: #5B4A7A; font-size: 15pt; margin: 0;"><b>A. It's time to get up.</b></p>
        <img src="check.png" style="width: 14pt; height: 14pt; margin-left: 6pt;">
      </div>
    </div>
    <div class="answer-row">
      <img src="num-3.png" style="width: 18pt; height: 18pt; margin-right: 6pt;">
      <div class="answer-card">
        <p style="color: #5B4A7A; font-size: 15pt; margin: 0;"><b>B. 日程安排</b></p>
        <img src="check.png" style="width: 14pt; height: 14pt; margin-left: 6pt;">
      </div>
    </div>
    <div class="answer-row">
      <img src="num-4.png" style="width: 18pt; height: 18pt; margin-right: 6pt;">
      <div class="answer-card">
        <p style="color: #5B4A7A; font-size: 15pt; margin: 0;"><b>A. It's eight thirty.</b></p>
        <img src="check.png" style="width: 14pt; height: 14pt; margin-left: 6pt;">
      </div>
    </div>
    <div class="tip-box">
      <p style="color: #E8739E; font-size: 13pt; margin: 0;"><b>Tip:</b> "It's time to + 动词" 表示"该做某事了"，"o'clock" 用于整点时间表达。</p>
    </div>
  </div>
</div>
</body>
</html>
