<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex;
  background-image: url('bg-cream.png');
  background-size: cover;
}
.page {
  width: 720pt; height: 405pt;
  display: flex; flex-direction: column;
}
.header {
  background: #FFB6C1;
  padding: 7pt 20pt;
  display: flex; align-items: center;
  border-radius: 0 0 14pt 14pt;
}
.tag {
  background: #FFFFFF;
  border-radius: 10pt;
  padding: 2pt 8pt;
  margin-right: 6pt;
}
.content {
  padding: 6pt 16pt;
  flex: 1;
  display: flex;
  gap: 8pt;
}
.left-panel {
  flex: 1;
  display: flex; flex-direction: column;
  gap: 5pt;
}
.right-panel {
  width: 180pt;
  display: flex; flex-direction: column;
  gap: 4pt;
}
.scene-box {
  background: #FFFFFF;
  border-radius: 14pt;
  padding: 6pt 10pt;
  border: 2pt solid #FFE4E9;
  flex: 1;
}
.scene-label {
  background: #FFB6C1;
  border-radius: 6pt;
  padding: 2pt 6pt;
  display: inline-block;
  margin-bottom: 3pt;
}
.time-badge {
  background: #DDA0DD;
  border-radius: 16pt;
  padding: 2pt 8pt;
  display: inline-block;
  margin-bottom: 3pt;
}
.d-bubble {
  background: #F0FAF8;
  border-radius: 10pt;
  padding: 4pt 8pt;
  margin-bottom: 3pt;
}
.d-bubble.right {
  background: #FFF0F5;
}
.vocab-card {
  background: #FFFFFF;
  border-radius: 10pt;
  padding: 4pt 8pt;
  border: 2pt solid #F0E0F5;
}
.tip-box {
  background: #FFF0F5;
  border-radius: 8pt;
  padding: 4pt 8pt;
  border: 1pt dashed #FFB6C1;
}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="tag">
      <p style="color: #E8739E; font-size: 11pt; margin: 0;"><b>Let's talk</b></p>
    </div>
    <h2 style="color: #FFFFFF; font-size: 22pt; margin: 0;">场景二：英语课 English Class</h2>
  </div>
  <div class="content">
    <div class="left-panel">
      <div class="scene-box">
        <div class="scene-label">
          <p style="color: #FFFFFF; font-size: 11pt; margin: 0;">Scene C - English Class</p>
        </div>
        <div class="time-badge">
          <p style="color: #FFFFFF; font-size: 14pt; margin: 0;"><b>8:30 a.m.</b></p>
        </div>
        <div class="d-bubble">
          <p style="color: #5B4A7A; font-size: 14pt; margin: 0;"><b>Teacher:</b> It's 8:30. It's time for English class.</p>
        </div>
        <div class="d-bubble right">
          <p style="color: #5B4A7A; font-size: 14pt; margin: 0;"><b>Students:</b> We're ready!</p>
        </div>
      </div>
      <div class="tip-box">
        <p style="color: #E8739E; font-size: 12pt; margin: 0;"><b>Note:</b> "It's time for + 名词" vs "It's time to + 动词"</p>
      </div>
    </div>
    <div class="right-panel">
      <h4 style="color: #9B59B6; font-size: 14pt; margin: 0 0 2pt 0;">重点词汇</h4>
      <div class="vocab-card">
        <p style="color: #5EA8A7; font-size: 13pt; margin: 0;"><b>get up</b> <span style="color: #A090B8;">起床</span></p>
      </div>
      <div class="vocab-card">
        <p style="color: #E8739E; font-size: 13pt; margin: 0;"><b>breakfast</b> <span style="color: #A090B8;">早餐</span></p>
      </div>
      <div class="vocab-card">
        <p style="color: #F0A030; font-size: 13pt; margin: 0;"><b>go to school</b> <span style="color: #A090B8;">去上学</span></p>
      </div>
      <div class="vocab-card">
        <p style="color: #5EA8A7; font-size: 13pt; margin: 0;"><b>English class</b> <span style="color: #A090B8;">英语课</span></p>
      </div>
      <div class="vocab-card">
        <p style="color: #9B59B6; font-size: 13pt; margin: 0;"><b>ready</b> <span style="color: #A090B8;">准备好的</span></p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
