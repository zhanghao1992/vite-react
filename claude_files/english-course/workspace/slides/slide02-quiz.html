<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex;
  background-image: url('bg-cream.png');
  background-size: cover;
}
.page {
  width: 720pt; height: 405pt;
  display: flex; flex-direction: column;
}
.header {
  background: #FFB6C1;
  padding: 7pt 20pt;
  display: flex; align-items: center;
  border-radius: 0 0 14pt 14pt;
}
.content {
  padding: 6pt 20pt 4pt 20pt;
  flex: 1;
}
.q-card {
  background: #FFFFFF;
  border-radius: 12pt;
  padding: 5pt 10pt;
  margin-bottom: 5pt;
  border: 2pt solid #FFE4E9;
  display: flex;
  align-items: flex-start;
}
.q-num {
  margin-right: 6pt;
  margin-top: 1pt;
}
.footer-badge {
  background: #E8D5F5;
  border-radius: 16pt;
  padding: 3pt 10pt;
  display: inline-block;
  align-self: flex-end;
  margin-top: 2pt;
}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <img src="star-pink.png" style="width: 18pt; height: 18pt; margin-right: 6pt;">
    <h2 style="color: #FFFFFF; font-size: 22pt; margin: 0;">课前小测试 Pre-class Quiz</h2>
    <img src="pencil.png" style="width: 18pt; height: 18pt; margin-left: 6pt;">
  </div>
  <div class="content">
    <div class="q-card">
      <img src="num-1.png" class="q-num" style="width: 18pt; height: 18pt;">
      <div>
        <p style="color: #5B4A7A; font-size: 15pt; margin: 0;"><b>What time is it?</b>（现在几点了？）</p>
        <p style="color: #A090B8; font-size: 13pt; margin: 2pt 0 0 0;">A. It's 7 o'clock.    B. It's seven clock.</p>
      </div>
    </div>
    <div class="q-card">
      <img src="num-2.png" class="q-num" style="width: 18pt; height: 18pt;">
      <div>
        <p style="color: #5B4A7A; font-size: 15pt; margin: 0;"><b>"该起床了"用英语怎么说？</b></p>
        <p style="color: #A090B8; font-size: 13pt; margin: 2pt 0 0 0;">A. It's time to get up.    B. It's time for get up.</p>
      </div>
    </div>
    <div class="q-card">
      <img src="num-3.png" class="q-num" style="width: 18pt; height: 18pt;">
      <div>
        <p style="color: #5B4A7A; font-size: 15pt; margin: 0;"><b>What does "schedule" mean?</b></p>
        <p style="color: #A090B8; font-size: 13pt; margin: 2pt 0 0 0;">A. 时间    B. 日程安排</p>
      </div>
    </div>
    <div class="q-card">
      <img src="num-4.png" class="q-num" style="width: 18pt; height: 18pt;">
      <div>
        <p style="color: #5B4A7A; font-size: 15pt; margin: 0;"><b>"It's 8:30"的正确读法是？</b></p>
        <p style="color: #A090B8; font-size: 13pt; margin: 2pt 0 0 0;">A. It's eight thirty.    B. It's eight past thirty.</p>
      </div>
    </div>
  </div>
  <div style="display: flex; justify-content: flex-end; padding: 0 20pt 5pt 20pt;">
    <div class="footer-badge">
      <p style="color: #9B59B6; font-size: 12pt; margin: 0;">Time: 5 minutes</p>
    </div>
  </div>
</div>
</body>
</html>
